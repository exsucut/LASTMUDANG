<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마지막 무당 — 추첨</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080706;--bg2:#111009;--bg3:#1c1a14;
  --text:#f0ede8;--text2:#9a9288;--text3:#3a3830;
  --gold:#c8a96e;--gold2:#8a6a35;--gold3:#f5d898;
  --silver:#a8b0b8;--bronze:#c4895a;
  --border:rgba(240,237,232,0.12);--border2:rgba(240,237,232,0.06);
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:"Noto Serif KR",Georgia,serif;overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(180,140,80,0.07) 0%,transparent 70%);pointer-events:none;}

header{position:relative;z-index:1;text-align:center;padding:3.5rem 1rem 2.5rem;border-bottom:0.5px solid var(--border2);}
.h-eyebrow{font-size:10px;letter-spacing:0.6em;color:var(--text3);margin-bottom:12px;}
.h-title{font-size:32px;font-weight:700;letter-spacing:0.15em;margin-bottom:6px;}
.h-sub{font-size:11px;letter-spacing:0.4em;color:var(--text2);}
#container{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:3rem 1.5rem 5rem;}

/* PIPS */
.stage-indicator{display:flex;align-items:center;justify-content:center;margin-bottom:3rem;}
.stage-pip{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 20px;}
.pip-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:all 0.5s;}
.pip-label{font-size:9px;letter-spacing:0.2em;color:var(--text3);transition:color 0.5s;}
.stage-pip.active .pip-dot{background:var(--gold);box-shadow:0 0 8px rgba(200,169,110,0.6);}
.stage-pip.active .pip-label{color:var(--gold);}
.stage-pip.done .pip-dot{background:var(--text2);}
.stage-pip.done .pip-label{color:var(--text2);}
.pip-line{flex:1;height:0.5px;background:var(--border2);max-width:60px;}

/* RANK */
.rank-crown{text-align:center;margin-bottom:2rem;}
.rank-number{font-size:80px;font-weight:700;line-height:1;color:var(--text3);transition:color 0.4s,text-shadow 0.4s;}
.rank-number.bronze{color:var(--bronze);text-shadow:0 0 40px rgba(196,137,90,0.3);}
.rank-number.silver{color:var(--silver);text-shadow:0 0 40px rgba(168,176,184,0.3);}
.rank-number.gold{color:var(--gold3);text-shadow:0 0 60px rgba(245,216,152,0.4);}
.rank-label{font-size:11px;letter-spacing:0.35em;color:var(--text2);margin-top:6px;}

/* STAGE */
.stage{border:0.5px solid var(--border);background:var(--bg2);padding:3rem 2rem;text-align:center;margin-bottom:1.5rem;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;position:relative;overflow:hidden;}
.stage::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(200,169,110,0.03) 0%,transparent 70%);pointer-events:none;}
.stage.rolling::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;animation:scanline 0.1s linear infinite;}
@keyframes scanline{from{background-position:0 0;}to{background-position:0 4px;}}
.slot-idle{font-size:13px;letter-spacing:0.25em;color:var(--text3);}
.slot-code{font-size:48px;font-weight:700;letter-spacing:0.2em;font-family:"Courier New",monospace;color:var(--text2);min-height:60px;line-height:1.2;}
.slot-code.rolling{color:var(--text3);animation:flicker 0.08s infinite;}
.slot-code.landed-bronze{color:var(--bronze);text-shadow:0 0 30px rgba(196,137,90,0.5);}
.slot-code.landed-silver{color:var(--silver);text-shadow:0 0 30px rgba(168,176,184,0.5);}
.slot-code.landed-gold{color:var(--gold3);text-shadow:0 0 50px rgba(245,216,152,0.6);animation:goldPulse 1.5s ease-in-out infinite;}
@keyframes flicker{0%,100%{opacity:1;}50%{opacity:0.6;}}
@keyframes goldPulse{0%,100%{text-shadow:0 0 40px rgba(245,216,152,0.5);}50%{text-shadow:0 0 80px rgba(245,216,152,0.9);}}
.progress-track{width:100%;max-width:280px;height:1px;background:var(--border2);}
.progress-fill{height:100%;background:var(--gold2);transition:width 0.08s linear;width:0%;}
.tension-msg{font-size:11px;letter-spacing:0.25em;color:var(--text3);min-height:16px;}

/* WINNER BOX */
.winner-box{width:100%;padding:1.8rem;border:0.5px solid var(--border);background:var(--bg2);text-align:center;margin-bottom:1.5rem;display:none;}
.winner-box.show{display:block;}
.winner-names{font-size:32px;font-weight:700;letter-spacing:0.12em;color:var(--text);margin-bottom:8px;line-height:1.4;}
.winner-code{font-family:"Courier New",monospace;font-size:14px;letter-spacing:0.2em;color:var(--text3);margin-bottom:10px;}
.janken-msg{font-size:12px;letter-spacing:0.15em;color:var(--gold2);margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border2);font-style:italic;}

/* BUTTONS */
.draw-btn{width:100%;padding:18px;font-size:13px;letter-spacing:0.4em;font-family:inherit;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;margin-bottom:1.5rem;}
.draw-btn.bronze-btn{background:var(--bronze);color:#1a0c04;}
.draw-btn.silver-btn{background:var(--silver);color:#0c1014;}
.draw-btn.gold-btn{background:var(--gold3);color:#1a1204;}
.draw-btn:hover{opacity:0.85;transform:translateY(-1px);}
.draw-btn:active{transform:translateY(0);}
.draw-btn:disabled{opacity:0.25;cursor:default;transform:none;}

/* RESULTS */
.results-section{margin-top:1rem;}
.results-label{font-size:10px;letter-spacing:0.35em;color:var(--text3);margin-bottom:14px;}
.result-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border:0.5px solid var(--border2);background:var(--bg2);margin-bottom:8px;opacity:0;transform:translateY(8px);transition:opacity 0.4s,transform 0.4s;}
.result-item.show{opacity:1;transform:translateY(0);}
.result-dot{width:5px;height:5px;border-radius:50%;}
.result-dot.b{background:var(--bronze);}
.result-dot.s{background:var(--silver);}
.result-dot.g{background:var(--gold3);box-shadow:0 0 8px rgba(245,216,152,0.6);}
.result-rank{font-size:11px;letter-spacing:0.15em;min-width:28px;}
.result-rank.b{color:var(--bronze);}
.result-rank.s{color:var(--silver);}
.result-rank.g{color:var(--gold3);}
.result-names{flex:1;font-size:14px;font-weight:600;letter-spacing:0.08em;color:var(--text);}
.result-code-txt{font-family:"Courier New",monospace;font-size:11px;color:var(--text3);}
.reset-btn{width:100%;padding:13px;margin-top:8px;font-size:11px;letter-spacing:0.25em;font-family:inherit;cursor:pointer;background:transparent;color:var(--text3);border:0.5px solid var(--border2);transition:all 0.2s;}
.reset-btn:hover{border-color:var(--border);color:var(--text2);}

/* PRIZE OVERLAY */
.prize-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(8,7,6,0.96);flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;text-align:center;padding:2rem;}
.prize-overlay.show{display:flex;}

.num-block{text-align:center;opacity:0;transform:scale(0.5);transition:opacity 0.4s,transform 0.5s cubic-bezier(0.34,1.56,0.64,1);}
.num-block.pop{opacity:1;transform:scale(1);}
.num-rank-txt{font-size:13px;letter-spacing:0.5em;margin-bottom:16px;opacity:0;transition:opacity 0.3s;}
.num-block.pop .num-rank-txt{opacity:1;}
.num-display{font-size:88px;font-weight:700;font-family:"Courier New",monospace;letter-spacing:0.05em;line-height:1;opacity:0;transform:scale(0.7);transition:opacity 0.35s,transform 0.5s cubic-bezier(0.34,1.56,0.64,1);}
.num-display.pop{opacity:1;transform:scale(1);}
.num-display.gold{color:var(--gold3);text-shadow:0 0 60px rgba(245,216,152,0.6);}
.num-display.silver{color:var(--silver);text-shadow:0 0 40px rgba(168,176,184,0.4);}
.num-display.bronze{color:var(--bronze);text-shadow:0 0 40px rgba(196,137,90,0.4);}
.num-rank-txt.gold{color:var(--gold);}
.num-rank-txt.silver{color:var(--silver);}
.num-rank-txt.bronze{color:var(--bronze);}

.quiz-block{text-align:center;padding:0 1.5rem;max-width:480px;display:none;}
.quiz-q{font-size:18px;font-weight:600;letter-spacing:0.08em;color:var(--text);line-height:1.8;margin-bottom:1.4rem;word-break:keep-all;opacity:0;transform:translateY(12px);transition:opacity 0.5s,transform 0.5s;}
.quiz-q.pop{opacity:1;transform:translateY(0);}
.quiz-a{font-size:28px;font-weight:700;letter-spacing:0.15em;opacity:0;}
.quiz-a.blink{opacity:1;animation:aBlink 0.5s ease-in-out infinite;}
.quiz-a.reveal{animation:none;opacity:1;}
@keyframes aBlink{0%,100%{opacity:0.15;}50%{opacity:1;}}

.prize-img-wrap{width:360px;height:360px;display:none;align-items:center;justify-content:center;opacity:0;transform:scale(0.6);transition:opacity 0.6s cubic-bezier(0.34,1.56,0.64,1),transform 0.6s cubic-bezier(0.34,1.56,0.64,1);}
.prize-img-wrap.show{display:flex;}
.prize-img-wrap.pop{opacity:1;transform:scale(1);}
.prize-img-wrap img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;image-rendering:-moz-crisp-edges;}
.prize-overlay-name{font-size:26px;font-weight:700;letter-spacing:0.2em;display:none;opacity:0;transform:translateY(20px);transition:opacity 0.4s,transform 0.4s;}
.prize-overlay-name.show{display:block;}
.prize-overlay-name.pop{opacity:1;transform:translateY(0);}
.prize-overlay-name.gold{color:var(--gold3);}
.prize-overlay-name.silver{color:var(--silver);}
.prize-overlay-name.bronze{color:var(--bronze);}
.prize-overlay-desc{font-size:12px;letter-spacing:0.25em;color:var(--text3);font-style:italic;display:none;opacity:0;transition:opacity 0.4s;}
.prize-overlay-desc.show{display:block;}
.prize-overlay-desc.pop{opacity:1;}
.prize-close{padding:12px 32px;font-size:11px;letter-spacing:0.25em;cursor:pointer;font-family:inherit;background:transparent;border:0.5px solid var(--border);color:var(--text2);transition:all 0.15s;display:none;opacity:0;transition:opacity 0.4s;}
.prize-close.show{display:block;}
.prize-close.pop{opacity:1;}
.prize-close:hover{background:rgba(240,237,232,0.04);color:var(--text);}

/* CONGRATS OVERLAY */
.congrats-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(8,7,6,0.97);align-items:center;justify-content:center;text-align:center;padding:2rem;}
.congrats-overlay.show{display:flex;}
.congrats-inner{max-width:480px;width:100%;animation:congratsIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes congratsIn{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}
.congrats-wu{font-size:56px;color:var(--gold2);opacity:0.35;margin-bottom:1rem;}
.congrats-title{font-size:30px;font-weight:700;letter-spacing:0.2em;color:var(--gold3);margin-bottom:0.8rem;text-shadow:0 0 40px rgba(245,216,152,0.4);}
.congrats-sub{font-size:12px;letter-spacing:0.12em;color:var(--text2);line-height:2.2;margin-bottom:2rem;word-break:keep-all;}
.congrats-results{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem;text-align:left;}
.congrats-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border:0.5px solid var(--border2);background:var(--bg2);}
.congrats-rank{font-size:11px;letter-spacing:0.2em;min-width:32px;}
.congrats-rank.g{color:var(--gold3);}
.congrats-rank.s{color:var(--silver);}
.congrats-rank.b{color:var(--bronze);}
.congrats-name{font-size:15px;font-weight:600;color:var(--text);flex:1;letter-spacing:0.06em;}
.congrats-prize-txt{font-size:11px;letter-spacing:0.08em;color:var(--text3);font-style:italic;}
.congrats-close{padding:12px 40px;font-size:11px;letter-spacing:0.3em;cursor:pointer;font-family:inherit;background:transparent;border:0.5px solid var(--border);color:var(--text2);transition:all 0.15s;}
.congrats-close:hover{background:rgba(240,237,232,0.04);color:var(--text);}

.confetti-piece{position:fixed;top:-10px;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none;z-index:999;}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>

/* ── AUDIO ── */
function playFanfare(rankKey){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var notes=rankKey===1?[523,659,784,1047,1047,784,1047]:rankKey===2?[440,554,659,880,880]:[349,440,523,523];
    var t=ctx.currentTime;
    notes.forEach(function(freq,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type="sine";
      var s=t+i*0.13,d=i===notes.length-1?0.5:0.12;
      g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.35,s+0.02);g.gain.linearRampToValueAtTime(0,s+d);
      o.start(s);o.stop(s+d+0.05);
    });
  }catch(e){}
}

function playBGM(){
  try{
    if(bgmAudio){bgmAudio.pause();bgmAudio=null;}
    bgmAudio=new Audio(BGM_SRC);
    bgmAudio.volume=0;bgmAudio.play();
    var vol=0,fade=setInterval(function(){
      vol=Math.min(0.75,vol+0.03);bgmAudio.volume=vol;
      if(vol>=0.75)clearInterval(fade);
    },80);
  }catch(e){}
}

function stopBGM(){
  if(!bgmAudio)return;
  var fade=setInterval(function(){
    bgmAudio.volume=Math.max(0,bgmAudio.volume-0.05);
    if(bgmAudio.volume<=0){clearInterval(fade);bgmAudio.pause();bgmAudio=null;}
  },80);
}

/* ── HELPERS ── */
function getNames(code){
  return PARTICIPANTS.filter(function(p){return p.code===String(code);});
}

function updatePips(){
  [3,2,1].forEach(function(r,i){
    var p=document.getElementById("pip-"+r);
    p.className="stage-pip";
    if(i<currentRankIdx)p.classList.add("done");
    else if(i===currentRankIdx)p.classList.add("active");
  });
}

function updateRankDisplay(){
  var rank=RANKS[currentRankIdx];
  var n=document.getElementById("rank-number");
  n.textContent=rank.key+"등";n.className="rank-number "+rank.numCls;
  document.getElementById("rank-label").textContent=rank.key+"등 추첨";
}

/* ── DRAW ── */
function startDraw(){
  if(rolling)return;
  rolling=true;
  var rank=RANKS[currentRankIdx];
  document.getElementById("draw-btn").disabled=true;
  document.getElementById("winner-box").className="winner-box";
  document.getElementById("janken-msg").style.display="none";
  updatePips();updateRankDisplay();
  var stage=document.getElementById("slot-stage");
  stage.className="stage rolling";
  stage.innerHTML='<div class="slot-code rolling" id="slot">————</div><div class="progress-track"><div class="progress-fill" id="prog"></div></div><div class="tension-msg" id="tmsg"></div>';
  var slot=document.getElementById("slot"),prog=document.getElementById("prog"),tmsg=document.getElementById("tmsg");
  var ticks=0,maxTicks=55+Math.floor(Math.random()*25),tensionIdx=0;
  var tensionTimer=setInterval(function(){tensionIdx=(tensionIdx+1)%rank.tension.length;tmsg.textContent=rank.tension[tensionIdx];},900);
  var timer=setInterval(function(){
    slot.textContent=pool[Math.floor(Math.random()*pool.length)];
    ticks++;prog.style.width=Math.round((ticks/maxTicks)*100)+"%";
    if(ticks>maxTicks-8){clearInterval(timer);slowReveal(slot,prog,tmsg,tensionTimer,rank);}
  },60);
}

function slowReveal(slot,prog,tmsg,tensionTimer,rank){
  var delays=[150,200,280,380,500,660,860];var i=0;
  function step(){
    if(i<delays.length-1){
      slot.textContent=pool[Math.floor(Math.random()*pool.length)];
      prog.style.width=Math.round(80+(i/delays.length)*20)+"%";
      i++;setTimeout(step,delays[i]);
    } else {
      clearInterval(tensionTimer);
      var wi=Math.floor(Math.random()*pool.length);
      var winner=pool.splice(wi,1)[0];
      prog.style.width="100%";
      tmsg.textContent=rank.key+"등 당첨";
      tmsg.style.color=rank.key===1?"#f5d898":rank.key===2?"#a8b0b8":"#c4895a";
      document.getElementById("slot-stage").className="stage";
      slot.className="slot-code "+rank.codeCls;
      slot.textContent=winner;
      rolling=false;

      var matched=getNames(winner);
      var wbox=document.getElementById("winner-box");
      var names=matched.length?matched.map(function(p){return p.name;}).join(" / "):winner+"번";
      document.getElementById("winner-names").textContent=names;
      document.getElementById("winner-code").textContent="추첨 번호 "+winner;
      if(matched.length>1)document.getElementById("janken-msg").style.display="block";
      wbox.className="winner-box show";

      addResult(winner,matched,rank,names);
      showPrize(rank.key,winner);

      setTimeout(function(){
        addRedrawBtn(winner,rank);
        advanceRank();
      },7000);
    }
  }
  setTimeout(step,delays[0]);
}

/* ── PRIZE OVERLAY ── */
function showPrize(rankKey,winnerCode){
  var overlay=document.getElementById("prize-overlay");
  var numBlock=document.getElementById("num-block");
  var numDisplay=document.getElementById("num-display");
  var numRankTxt=document.getElementById("num-rank-txt");
  var quizBlock=document.getElementById("quiz-block");
  var quizQ=document.getElementById("quiz-q");
  var quizA=document.getElementById("quiz-a");
  var imgWrap=document.getElementById("prize-img-wrap");
  var pname=document.getElementById("prize-overlay-name");
  var pdesc=document.getElementById("prize-overlay-desc");
  var pclose=document.getElementById("prize-close");

  // Reset
  numBlock.classList.remove("pop");numDisplay.classList.remove("pop");
  quizBlock.style.display="none";quizQ.classList.remove("pop");
  quizA.classList.remove("blink","reveal");
  imgWrap.classList.remove("show","pop");
  pname.classList.remove("show","pop");
  pdesc.classList.remove("show","pop");
  pclose.classList.remove("show","pop");

  var cls=PRIZE_CLS[rankKey];
  numDisplay.textContent=winnerCode+"번";
  numDisplay.className="num-display "+cls;
  numRankTxt.textContent=rankKey+"등 당첨";
  numRankTxt.className="num-rank-txt "+cls;

  var quiz=QUIZZES[rankKey];
  quizQ.textContent=quiz.q;
  quizA.textContent=quiz.a;
  quizA.className="quiz-a";
  quizA.style.color=rankKey===1?"var(--gold3)":rankKey===2?"var(--silver)":"var(--bronze)";

  document.getElementById("prize-overlay-img").src=PRIZE_IMGS[rankKey];
  pname.textContent=rankKey===1?"방울 방울 방울 토마토":rankKey===2?"제로 콜라":"만신창이 파스";
  pname.className="prize-overlay-name "+cls;
  pdesc.textContent=rankKey===1?"무당의 방울... 토마토":rankKey===2?"콜라... 불렀습니다":"만신이 드립니다";

  overlay.classList.add("show");

  // 1단계: 번호 팡 + 팡파레
  setTimeout(function(){
    numBlock.classList.add("pop");
    setTimeout(function(){
      numDisplay.classList.add("pop");
      playFanfare(rankKey);
      fireConfetti();
    },200);
  },300);

  // 2단계: 번호 → 퀴즈
  setTimeout(function(){
    numBlock.style.opacity="0";
    numBlock.style.transform="scale(0.8)";
    numBlock.style.transition="opacity 0.4s,transform 0.4s";
    setTimeout(function(){
      numBlock.style.display="none";
      quizBlock.style.display="block";
      setTimeout(function(){quizQ.classList.add("pop");},200);
    },400);
  },3000);

  // 3단계: 힌트 깜빡
  setTimeout(function(){quizA.classList.add("blink");},4600);

  // 4단계: 이미지 공개
  setTimeout(function(){
    quizA.classList.remove("blink");quizA.classList.add("reveal");
    setTimeout(function(){
      quizBlock.style.display="none";
      imgWrap.classList.add("show");
      setTimeout(function(){
        imgWrap.classList.add("pop");
        setTimeout(function(){
          pname.classList.add("show");
          setTimeout(function(){pname.classList.add("pop");},50);
          setTimeout(function(){
            pdesc.classList.add("show");
            setTimeout(function(){pdesc.classList.add("pop");},50);
            pclose.classList.add("show");
            setTimeout(function(){pclose.classList.add("pop");},50);
            if(rankKey===1)setTimeout(fireConfetti,200);
          },350);
        },450);
      },100);
    },800);
  },5800);
}

function closePrize(){
  var overlay=document.getElementById("prize-overlay");
  overlay.classList.remove("show");
  var numBlock=document.getElementById("num-block");
  numBlock.style.display="";numBlock.style.opacity="";
  numBlock.style.transform="";numBlock.style.transition="";
}

function closePrizeAndContinue(){
  closePrize();
}

/* ── CONGRATS ── */
function showCongrats(){
  var overlay=document.getElementById("congrats-overlay");
  var resultsEl=document.getElementById("congrats-results");
  var sorted=allWinners.slice().sort(function(a,b){return a.rank-b.rank;});
  var rows="";
  sorted.forEach(function(w){
    var cls=w.rank===1?"g":w.rank===2?"s":"b";
    rows+='<div class="congrats-row"><div class="congrats-rank '+cls+'">'+w.rank+'등</div><div class="congrats-name">'+w.names+'</div><div class="congrats-prize-txt">'+w.prize+'</div></div>';
  });
  resultsEl.innerHTML=rows;
  overlay.classList.add("show");
  fireConfetti();
  setTimeout(fireConfetti,700);
  setTimeout(fireConfetti,1400);
  // BGM은 닫기 버튼(사용자 터치) 시점에 재생
}

function closeCongrats(){
  document.getElementById("congrats-overlay").classList.remove("show");
  stopBGM();
}

/* ── RESULTS ── */
function addResult(code,matched,rank,names){
  var section=document.getElementById("results-section");
  if(!section.querySelector(".results-label"))section.innerHTML='<div class="results-label">당첨 결과</div>';
  var existing=section.querySelector("[data-rank='"+rank.key+"']");
  if(existing)existing.remove();
  var item=document.createElement("div");
  item.className="result-item";item.setAttribute("data-rank",rank.key);
  item.innerHTML='<div class="result-dot '+rank.dotCls+'"></div><div class="result-rank '+rank.rankCls+'">'+rank.key+'등</div><div class="result-names">'+names+'</div><div class="result-code-txt">'+code+'번</div>';
  var lbl=section.querySelector(".results-label");
  section.insertBefore(item,lbl.nextSibling);
  requestAnimationFrame(function(){requestAnimationFrame(function(){item.classList.add("show");});});
  var ex=allWinners.findIndex(function(w){return w.rank===rank.key;});
  if(ex>=0)allWinners.splice(ex,1);
  allWinners.push({rank:rank.key,code:code,names:names,prize:rank.prize});
}

/* ── REDRAW ── */
function addRedrawBtn(code,rank){
  var existing=document.getElementById("redraw-"+rank.key);
  if(existing)existing.remove();
  var btn=document.createElement("button");
  btn.id="redraw-"+rank.key;btn.className="reset-btn";btn.style.marginTop="8px";
  btn.textContent=rank.key+"등 다시 뽑기";
  btn.onclick=(function(c,r){return function(){
    pool.push(c);
    var item=document.querySelector("[data-rank='"+r.key+"']");if(item)item.remove();
    btn.remove();
    var wi=allWinners.findIndex(function(w){return w.rank===r.key;});if(wi>=0)allWinners.splice(wi,1);
    currentRankIdx=RANKS.indexOf(r);rolling=false;
    var db=document.getElementById("draw-btn");
    db.style.display="";db.className="draw-btn "+r.btnCls;db.textContent=r.btnText;db.disabled=false;
    document.getElementById("winner-box").className="winner-box";
    document.getElementById("slot-stage").className="stage";
    document.getElementById("slot-stage").innerHTML='<div class="slot-idle">다시 뽑기 버튼을 눌러 재추첨하세요</div>';
    var rb=document.querySelector(".reset-btn:not([id])");if(rb)rb.remove();
    updatePips();updateRankDisplay();
  };})(code,rank);
  var section=document.getElementById("results-section");
  var item=section.querySelector("[data-rank='"+rank.key+"']");
  if(item)item.insertAdjacentElement("afterend",btn);
}

/* ── ADVANCE ── */
function advanceRank(){
  currentRankIdx++;
  if(currentRankIdx<RANKS.length){
    var nr=RANKS[currentRankIdx];
    var btn=document.getElementById("draw-btn");
    btn.style.display="";btn.className="draw-btn "+nr.btnCls;btn.textContent=nr.btnText;btn.disabled=false;
    updatePips();updateRankDisplay();
    document.getElementById("slot-stage").innerHTML='<div class="slot-idle">다음 추첨 버튼을 눌러 계속하세요</div>';
  } else {
    document.getElementById("draw-btn").style.display="none";
    var rb=document.createElement("button");
    rb.className="reset-btn";rb.textContent="전체 다시 추첨하기";rb.onclick=resetAll;
    document.getElementById("container").appendChild(rb);
    updatePips();
    var n=document.getElementById("rank-number");n.textContent="巫";n.className="rank-number gold";
    document.getElementById("rank-label").textContent="추첨 완료";
    setTimeout(showCongrats,1000);
  }
}

/* ── CONFETTI ── */
function fireConfetti(){
  var colors=["#f5d898","#c8a96e","#f0ede8","#c4895a","#a8b0b8","#ffffff"];
  for(var i=0;i<80;i++){
    (function(i){setTimeout(function(){
      var el=document.createElement("div");el.className="confetti-piece";
      var size=4+Math.random()*8;
      el.style.cssText="left:"+(Math.random()*100)+"vw;width:"+size+"px;height:"+(size*(0.4+Math.random()*0.6))+"px;background:"+colors[Math.floor(Math.random()*colors.length)]+";animation-duration:"+(2.5+Math.random()*2)+"s;";
      document.body.appendChild(el);setTimeout(function(){el.remove();},5000);
    },i*30);})(i);
  }
}

/* ── RESET ── */
function resetAll(){
  pool=CODES.slice();currentRankIdx=0;rolling=false;allWinners=[];
  stopBGM();
  document.getElementById("congrats-overlay").classList.remove("show");
  document.getElementById("results-section").innerHTML="";
  document.getElementById("winner-box").className="winner-box";
  document.getElementById("janken-msg").style.display="none";
  var n=document.getElementById("rank-number");n.textContent="—";n.className="rank-number";
  document.getElementById("rank-label").textContent="준비";
  document.getElementById("slot-stage").className="stage";
  document.getElementById("slot-stage").innerHTML='<div class="slot-idle">추첨 버튼을 눌러 시작하세요</div>';
  var btn=document.getElementById("draw-btn");
  btn.style.display="";btn.className="draw-btn bronze-btn";btn.textContent="3등 추첨 시작";btn.disabled=false;
  var rb=document.querySelector(".reset-btn:not([id])");if(rb)rb.remove();
  [3,2,1].forEach(function(r){document.getElementById("pip-"+r).className="stage-pip";});
}

updatePips();
</script>
</body>
</html>
